<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Hub • Share • Solve • Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .logo-font { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-6xl mx-auto">
    <!-- Navbar -->
    <nav class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
      <div class="px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center text-white font-bold logo-font">D</div>
          <h1 class="text-2xl font-semibold logo-font tracking-tight">DevOps Hub</h1>
        </div>
        
        <div class="flex items-center gap-6 text-sm">
          <button onclick="showFeed()" class="flex items-center gap-2 hover:text-emerald-400 transition-colors">
            <i class="fa-solid fa-house"></i> Feed
          </button>
          <button onclick="showCreateModal()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-2xl font-medium transition-all">
            <i class="fa-solid fa-plus"></i> New Post
          </button>
          <div class="w-8 h-8 bg-zinc-700 rounded-full flex items-center justify-center cursor-pointer">
            👨‍💻
          </div>
        </div>
      </div>
    </nav>

    <div class="flex">
      <!-- Sidebar -->
      <div class="w-64 border-r border-zinc-800 p-6 hidden lg:block h-[calc(100vh-73px)] overflow-auto">
        <div class="mb-8">
          <h3 class="text-xs uppercase tracking-widest text-zinc-500 mb-3">Explore</h3>
          <div onclick="filterByTag('all')" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-1 active">
            <i class="fa-solid fa-fire text-orange-400"></i>
            <span class="font-medium">Trending</span>
          </div>
          <div onclick="filterByTag('CI/CD')" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-1">
            <i class="fa-solid fa-gears"></i>
            <span>CI/CD</span>
          </div>
          <div onclick="filterByTag('Kubernetes')" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-1">
            <i class="fa-solid fa-cube"></i>
            <span>Kubernetes</span>
          </div>
          <div onclick="filterByTag('AWS')" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-2xl cursor-pointer">
            <i class="fa-solid fa-cloud"></i>
            <span>AWS / Cloud</span>
          </div>
        </div>
        
        <div>
          <h3 class="text-xs uppercase tracking-widest text-zinc-500 mb-3">Popular Tags</h3>
          <div class="flex flex-wrap gap-2">
            <span onclick="filterByTag('Terraform')" class="text-xs bg-zinc-900 hover:bg-zinc-800 px-3 py-1 rounded-full cursor-pointer">#Terraform</span>
            <span onclick="filterByTag('GitHub Actions')" class="text-xs bg-zinc-900 hover:bg-zinc-800 px-3 py-1 rounded-full cursor-pointer">#GitHubActions</span>
            <span onclick="filterByTag('ArgoCD')" class="text-xs bg-zinc-900 hover:bg-zinc-800 px-3 py-1 rounded-full cursor-pointer">#ArgoCD</span>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="flex-1 p-6" id="main-content">
        <div class="mb-6 flex items-center justify-between">
          <h2 id="page-title" class="text-3xl font-semibold">Community Feed</h2>
          <div class="flex items-center gap-3">
            <input id="search-input" type="text" placeholder="Search issues or solutions..." 
                   class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 w-80 focus:outline-none focus:border-emerald-500 text-sm"
                   onkeyup="if(event.key === 'Enter') searchPosts()">
            <button onclick="searchPosts()" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <!-- Feed -->
        <div id="feed" class="space-y-6"></div>
      </div>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="create-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-2xl mx-4 p-8">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-semibold">Share your DevOps thought</h3>
        <button onclick="hideCreateModal()" class="text-zinc-400 hover:text-white text-2xl">×</button>
      </div>
      
      <input id="post-title" type="text" placeholder="Title (e.g. GitHub Actions cache not working on monorepo)" 
             class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-emerald-500">
      
      <textarea id="post-body" rows="6" placeholder="Describe the problem, what you tried, error logs, or your solution..." 
                class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 mb-4 focus:outline-none focus:border-emerald-500"></textarea>
      
      <div class="flex gap-3 mb-6">
        <select id="post-type" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 flex-1">
          <option value="Problem">Problem</option>
          <option value="Solution">Solution</option>
          <option value="Discussion">Discussion</option>
        </select>
        <input id="post-tags" type="text" placeholder="Tags (comma separated)" 
               class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 flex-1">
      </div>

      <div class="flex justify-end gap-3">
        <button onclick="hideCreateModal()" class="px-8 py-3 rounded-2xl hover:bg-zinc-800">Cancel</button>
        <button onclick="createPost()" class="bg-emerald-600 hover:bg-emerald-500 px-8 py-3 rounded-2xl font-medium">Post to Community</button>
      </div>
    </div>
  </div>

  <!-- Post Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-3xl mx-4 max-h-[90vh] overflow-hidden flex flex-col">
      <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <div id="detail-title" class="font-semibold text-xl"></div>
        <button onclick="hideDetailModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
      </div>
      
      <div class="p-6 overflow-auto flex-1" id="detail-body"></div>
      
      <div class="p-6 border-t border-zinc-800">
        <div class="flex items-center gap-4 text-sm text-zinc-400 mb-4">
          <span id="detail-likes"></span>
          <span id="detail-comments-count"></span>
        </div>
        
        <div class="mb-6">
          <h4 class="font-medium mb-3">Comments</h4>
          <div id="comments-list" class="space-y-4 mb-6"></div>
          
          <div class="flex gap-3">
            <input id="comment-input" type="text" placeholder="Share a solution or ask a question..." 
                   class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
            <button onclick="addComment()" class="bg-emerald-600 hover:bg-emerald-500 px-8 rounded-2xl">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let posts = JSON.parse(localStorage.getItem('devopsPosts')) || [
      {
        id: 1,
        type: "Problem",
        title: "Terraform apply failing with IAM role assumption on EKS",
        body: "Getting AccessDenied when assuming role in CI/CD. Works locally but fails in GitHub Actions. Any ideas?",
        tags: ["Terraform", "AWS", "EKS"],
        likes: 24,
        comments: [
          { id: 101, text: "Check if the OIDC provider is correctly configured in the trust policy.", likes: 8 }
        ],
        timestamp: "2h ago"
      },
      {
        id: 2,
        type: "Solution",
        title: "How I reduced GitHub Actions runtime by 40% using caching",
        body: "Shared my workflow with setup-node cache and composite actions. Huge win for monorepos.",
        tags: ["GitHub Actions", "CI/CD"],
        likes: 41,
        comments: [],
        timestamp: "1d ago"
      },
      {
        id: 3,
        type: "Discussion",
        title: "Is ArgoCD still the best for GitOps in 2026?",
        body: "Comparing with Flux v2 and Crossplane. What are you all using in production?",
        tags: ["ArgoCD", "GitOps", "Kubernetes"],
        likes: 18,
        comments: [{ id: 102, text: "Flux is lighter but ArgoCD has better UI for non-devs.", likes: 5 }],
        timestamp: "3d ago"
      }
    ];

    function savePosts() {
      localStorage.setItem('devopsPosts', JSON.stringify(posts));
    }

    function renderFeed(filteredPosts = posts) {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';

      if (filteredPosts.length === 0) {
        feed.innerHTML = `<p class="text-zinc-500 text-center py-12">No posts found.</p>`;
        return;
      }

      filteredPosts.forEach(post => {
        const postEl = document.createElement('div');
        postEl.className = `bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-emerald-500/30 cursor-pointer transition-all`;
        postEl.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <span class="inline-block px-3 py-1 text-xs font-medium rounded-full ${post.type === 'Problem' ? 'bg-red-500/10 text-red-400' : post.type === 'Solution' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-blue-500/10 text-blue-400'}">
                ${post.type}
              </span>
            </div>
            <span class="text-xs text-zinc-500">${post.timestamp}</span>
          </div>
          
          <h3 onclick="viewPost(${post.id})" class="text-xl font-semibold mb-3 hover:text-emerald-400 transition-colors">${post.title}</h3>
          <p onclick="viewPost(${post.id})" class="text-zinc-400 line-clamp-2 mb-5">${post.body.substring(0, 180)}...</p>
          
          <div class="flex flex-wrap gap-2 mb-6">
            ${post.tags.map(tag => `<span class="text-xs bg-zinc-800 px-3 py-1 rounded-full">#${tag}</span>`).join('')}
          </div>
          
          <div class="flex items-center justify-between text-sm">
            <div onclick="likePost(${post.id}); event.stopImmediatePropagation()" class="flex items-center gap-2 cursor-pointer hover:text-emerald-400">
              <i class="fa-solid fa-heart"></i>
              <span id="like-count-${post.id}">${post.likes}</span>
            </div>
            <div onclick="viewPost(${post.id}); event.stopImmediatePropagation()" class="flex items-center gap-2 cursor-pointer hover:text-emerald-400">
              <i class="fa-solid fa-comment"></i>
              <span>${post.comments.length}</span>
            </div>
            <div class="text-emerald-400 text-xs font-medium">Read thread →</div>
          </div>
        `;
        feed.appendChild(postEl);
      });
    }

    function createPost() {
      const title = document.getElementById('post-title').value.trim();
      const body = document.getElementById('post-body').value.trim();
      const type = document.getElementById('post-type').value;
      const tagsStr = document.getElementById('post-tags').value;

      if (!title || !body) {
        alert("Title and description are required!");
        return;
      }

      const newPost = {
        id: Date.now(),
        type,
        title,
        body,
        tags: tagsStr ? tagsStr.split(',').map(t => t.trim()) : ["General"],
        likes: 0,
        comments: [],
        timestamp: "just now"
      };

      posts.unshift(newPost);
      savePosts();
      hideCreateModal();
      renderFeed();
    }

    function likePost(id) {
      const post = posts.find(p => p.id === id);
      if (post) {
        post.likes++;
        savePosts();
        renderFeed();
      }
    }

    let currentPostId = null;

    function viewPost(id) {
      currentPostId = id;
      const post = posts.find(p => p.id === id);
      if (!post) return;

      document.getElementById('detail-title').textContent = post.title;
      document.getElementById('detail-body').innerHTML = `
        <div class="prose prose-invert max-w-none">
          <p class="text-zinc-300 leading-relaxed">${post.body}</p>
        </div>
        <div class="flex flex-wrap gap-2 mt-8">
          ${post.tags.map(tag => `<span class="text-xs bg-zinc-800 px-4 py-2 rounded-full">#${tag}</span>`).join('')}
        </div>
      `;
      
      document.getElementById('detail-likes').innerHTML = `<i class="fa-solid fa-heart text-red-400"></i> ${post.likes} likes`;
      document.getElementById('detail-comments-count').innerHTML = `${post.comments.length} comments`;

      renderComments(post);

      document.getElementById('detail-modal').classList.remove('hidden');
      document.getElementById('detail-modal').classList.add('flex');
    }

    function renderComments(post) {
      const container = document.getElementById('comments-list');
      container.innerHTML = '';

      post.comments.forEach(comment => {
        const div = document.createElement('div');
        div.className = "bg-zinc-800 rounded-2xl p-5";
        div.innerHTML = `
          <p class="text-zinc-300">${comment.text}</p>
          <div class="text-xs text-zinc-500 mt-3 flex items-center gap-2">
            <span>👍 ${comment.likes || 0}</span>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (!text || !currentPostId) return;

      const post = posts.find(p => p.id === currentPostId);
      if (post) {
        post.comments.push({
          id: Date.now(),
          text,
          likes: 0
        });
        savePosts();
        renderComments(post);
        document.getElementById('detail-comments-count').innerHTML = `${post.comments.length} comments`;
        input.value = '';
      }
    }

    function hideDetailModal() {
      const modal = document.getElementById('detail-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function showCreateModal() {
      document.getElementById('create-modal').classList.remove('hidden');
      document.getElementById('create-modal').classList.add('flex');
      document.getElementById('post-title').focus();
    }

    function hideCreateModal() {
      const modal = document.getElementById('create-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      // Clear form
      document.getElementById('post-title').value = '';
      document.getElementById('post-body').value = '';
      document.getElementById('post-tags').value = '';
    }

    function showFeed() {
      renderFeed();
    }

    function filterByTag(tag) {
      if (tag === 'all') {
        renderFeed();
        return;
      }
      const filtered = posts.filter(p => p.tags.some(t => t.toLowerCase() === tag.toLowerCase()));
      renderFeed(filtered);
    }

    function searchPosts() {
      const term = document.getElementById('search-input').value.toLowerCase().trim();
      if (!term) {
        renderFeed();
        return;
      }
      const filtered = posts.filter(p => 
        p.title.toLowerCase().includes(term) || 
        p.body.toLowerCase().includes(term) ||
        p.tags.some(tag => tag.toLowerCase().includes(term))
      );
      renderFeed(filtered);
    }

    // Initialize
    window.onload = () => {
      renderFeed();
      
      // Close modals on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
          hideCreateModal();
          hideDetailModal();
        }
      });
    };
  </script>
</body>
</html>
